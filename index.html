<html>
  <head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  </head>
  <body>
    <div>
      <label for="date">Enter a date (YYYY-MM-DD):</label>
      <input type="text" id="date" name="date">
      <button onclick="searchEvents()">Search</button>
    </div>
    <div id="events"></div>
    <script>
      function searchEvents() {
        var date = $("#date").val();
        var url = "https://en.wikipedia.org/w/api.php?action=query&format=json&list=embeddedin&eititle=Template:Event&eilimit=500&eistart=" + date + "T00:00:00Z&eiend=" + date + "T23:59:59Z&callback=?";
        $.getJSON(url, function(data) {
          var events = data.query.embeddedin;
          var eventList = "";
          for (var i = 0; i < events.length; i++) {
            eventList += "<li>" + events[i].title + "</li>";
          }
          $("#events").html("<ul>" + eventList + "</ul>");
        });
      }
    </script>
  </body>
</html>
