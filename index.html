                </select>
              </div>

  <script>

    function handleInterestPaidOutChange(interestPaidOut) {
      var compoundFrequency = document.getElementById("compoundFrequency");
      if (interestPaidOut.value !== "atMaturity") {
        compoundFrequency.disabled = true;
      } else {
        compoundFrequency.disabled = false;
      }
    }



    function calculateFD() {
      let principal = document.getElementById("principalAmount1").value;
      let rate = parseFloat(document.getElementById("rate1").value);
      let years = (document.getElementById("years").value);
      let months = (document.getElementById("months").value);
      let days = (document.getElementById("days").value);
      let compoundFrequency = document.getElementById("compoundFrequency").value;
      let interestPaidOut = document.getElementById("interestPaidOut").value;
      let output = document.getElementById("output1");
      let boxAmount = document.getElementById("principalAmount1");
      let boxRate = document.getElementById("rate1");
      let boxY = document.getElementById("years");
      let boxM = document.getElementById("months");
      let boxD = document.getElementById("days");
      let errorInFields = false;
      output.style.display = "block";


      if (!principal || isNaN(principal) || principal <= 0) {
        boxAmount.style.borderColor = "red";
        errorInFields = true;
      }

      if (!rate || isNaN(rate) || rate <= 0) {
        boxRate.style.borderColor = "red";
        errorInFields = true;
      }


      if (years == "") { years = 0 };
      if (months == "") { months = 0 };
      if (days == "") { days = 0 };
      years = parseInt(years);
      months = parseInt(months);
      days = parseInt(days);
      let period = (years + months / 12 + days / 365);

      if (!period || isNaN(period) || period <= 0) {
        boxD.style.borderColor = "red";
        boxY.style.borderColor = "red";
        boxM.style.borderColor = "red";
        errorInFields = true;
      }

      if (errorInFields) {
        output.style.color = "red";
        output.innerHTML = "Please enter valid input in all fields";
      } else {
        output.style.color = "white";
        boxAmount.style.borderColor = "#ced4da";
        boxRate.style.borderColor = "#ced4da";
        boxD.style.borderColor = "#ced4da";
        boxY.style.borderColor = "#ced4da";
        boxM.style.borderColor = "#ced4da";

        if (interestPaidOut == "atMaturity") {
          if (compoundFrequency == "quarterly") {
            rate = rate / 4;
            period = period * 4;
          } else if (compoundFrequency == "halfYearly") {
            rate = rate / 2;
            period = period * 2;
          }

          let interest = principal * Math.pow(1 + rate / 100, period) - principal;

          // Create a new span element for interestAmount
          var interestAmountSpan = document.createElement("span");
          interestAmountSpan.className = "specialText";
          var interestAmountTextNode = document.createTextNode((interest).toFixed(2));
          interestAmountSpan.appendChild(interestAmountTextNode);

          // Create a new span element for maturityAmount
          var maturityAmountSpan = document.createElement("span");
          maturityAmountSpan.className = "specialText";
          var maturityAmountTextNode = document.createTextNode((parseFloat(principal) + parseFloat(interest)).toFixed(2));
          maturityAmountSpan.appendChild(maturityAmountTextNode);

          // Set the inner HTML of the output element to the static text plus the two span elements
          document.getElementById("output1").innerHTML = "Total Interest Paid : ";
          document.getElementById("output1").appendChild(interestAmountSpan);
          document.getElementById("output1").innerHTML += "<br> Maturity Amount : ";
          document.getElementById("output1").appendChild(maturityAmountSpan);
        } else {
          let interestPaidAnnualy = (principal * rate) / 100;
          let interestPaid = 0;
          let interest = (principal * rate * period) / 100;

          // Create a new span element for totalInterestAmount
          var interestAmountSpan = document.createElement("span");
          interestAmountSpan.className = "specialText";
          var interestAmountTextNode = document.createTextNode((interest).toFixed(1));
          interestAmountSpan.appendChild(interestAmountTextNode);

          // Create a new span element for periodicInterestAmount
          var periodicInterestAmountSpan = document.createElement("span");
          periodicInterestAmountSpan.className = "specialText";

          if (interestPaidOut == "monthly") {
            interestPaid = interestPaidAnnualy / 12;

            var periodicInterestAmountTextNode = document.createTextNode((interestPaid).toFixed(2));
            periodicInterestAmountSpan.appendChild(periodicInterestAmountTextNode);

            // Set the inner HTML of the output element to the static text plus the two span elements
            document.getElementById("output1").innerHTML = "Interest Paid Monthly : ";
            document.getElementById("output1").appendChild(periodicInterestAmountSpan);
            document.getElementById("output1").innerHTML += "<br> Total Interest Paid : ";
            document.getElementById("output1").appendChild(interestAmountSpan);
          }
          else if (interestPaidOut == "quarterly") {
            interestPaid = interestPaidAnnualy / 4;

            var periodicInterestAmountTextNode = document.createTextNode((interestPaid).toFixed(2));
            periodicInterestAmountSpan.appendChild(periodicInterestAmountTextNode);

            // Set the inner HTML of the output element to the static text plus the two span elements
            document.getElementById("output1").innerHTML = "Interest Paid Quarterly : ";
            document.getElementById("output1").appendChild(periodicInterestAmountSpan);
            document.getElementById("output1").innerHTML += "<br> Total Interest Paid : ";
            document.getElementById("output1").appendChild(interestAmountSpan);

          } else if (interestPaidOut == "halfYearly") {
            interestPaid = interestPaidAnnualy / 2;

            var periodicInterestAmountTextNode = document.createTextNode((interestPaid).toFixed(2));
            periodicInterestAmountSpan.appendChild(periodicInterestAmountTextNode);

            // Set the inner HTML of the output element to the static text plus the two span elements
            document.getElementById("output1").innerHTML = "Interest Paid Half Yearly : ";
            document.getElementById("output1").appendChild(periodicInterestAmountSpan);
            document.getElementById("output1").innerHTML += "<br> Total Interest Paid : ";
            document.getElementById("output1").appendChild(interestAmountSpan);
          } else {
            interestPaid = interestPaidAnnualy;

            var periodicInterestAmountTextNode = document.createTextNode((interestPaid).toFixed(2));
            periodicInterestAmountSpan.appendChild(periodicInterestAmountTextNode);

            // Set the inner HTML of the output element to the static text plus the two span elements
            document.getElementById("output1").innerHTML = "Interest Paid Annualy : ";
            document.getElementById("output1").appendChild(periodicInterestAmountSpan);
            document.getElementById("output1").innerHTML += "<br> Total Interest Paid : ";
            document.getElementById("output1").appendChild(interestAmountSpan);
          }

        }
      }




    }




    function calculateRD() {
      // Get the input values from the form
      let principal = document.getElementById("principalRD").value;
      let rate = document.getElementById("rateRD").value / 100;
      let period = document.getElementById("periodRD").value;
      let boxAmount = document.getElementById("principalRD");
      let boxRate = document.getElementById("rateRD");
      let boxPeriod = document.getElementById("periodRD");
      let output = document.getElementById("output2");
      let errorInFields = false;

      output.style.display = "block";

      // Validate the input values

      if (!principal || isNaN(principal) || principal <= 0) {
        boxAmount.style.borderColor = "red";
        errorInFields = true;
      }

      if (!rate || isNaN(rate) || rate <= 0) {
        boxRate.style.borderColor = "red";
        errorInFields = true;
      }

      if (!period || isNaN(period) || period <= 0) {
        boxPeriod.style.borderColor = "red";
        errorInFields = true;
      }

      if (errorInFields) {
        output.style.color = "red";
        output.innerHTML = "Please enter valid input in all fields";
      } else {
        // Clear any previous error messages
        output.style.color = "white";
        boxAmount.style.borderColor = "#ced4da";
        boxRate.style.borderColor = "#ced4da";
        boxPeriod.style.borderColor = "#ced4da";

        let totalInvestment = (period * principal);
        let futureValue = 0;
        rate = rate / 12;
        futureValue = principal * (1 + rate) * (Math.pow(1 + rate, period) - 1) / rate;


        // Create a new span element for totalInv
        var totalInvSpan = document.createElement("span");
        totalInvSpan.className = "specialText";
        var totalInvTextNode = document.createTextNode((totalInvestment).toFixed(2));
        totalInvSpan.appendChild(totalInvTextNode);

        // Create a new span element for retOnInv
        var retOnInvSpan = document.createElement("span");
        retOnInvSpan.className = "specialText";
        var retOnInvTextNode = document.createTextNode((futureValue - totalInvestment).toFixed(2));
        retOnInvSpan.appendChild(retOnInvTextNode);

        // Create a new span element for maturityAmount
        var maturityAmountSpan = document.createElement("span");
        maturityAmountSpan.className = "specialText";
        var maturityAmountTextNode = document.createTextNode((futureValue).toFixed(2));
        maturityAmountSpan.appendChild(maturityAmountTextNode);



        // Set the inner HTML of the output element to the static text plus the two span elements
        document.getElementById("output2").innerHTML = "Total Investment : ";
        document.getElementById("output2").appendChild(totalInvSpan);
        document.getElementById("output2").innerHTML += "<br> Return on Investment : ";
        document.getElementById("output2").appendChild(retOnInvSpan);
        document.getElementById("output2").innerHTML += "<br> Final Maturity Amount : ";
        document.getElementById("output2").appendChild(maturityAmountSpan);

      }
    }

  </script>

      setTimeout(() => {
        var items = document.querySelectorAll('.sidenavMenuItems');
        for (var i = 0; i < items.length; i++) {
          items[i].style.display = "block";
        }
        // document.getElementById("visitor-counter").style.display = "block";
      }, 200);

    }

    /* Close/hide the side navigation */
    function closeNav() {
      document.getElementById("mySidenav").style.width = "0";
      // document.getElementById("visitor-counter").style.display = "none";
      var items = document.querySelectorAll('.sidenavMenuItems');
      for (var i = 0; i < items.length; i++) {
        items[i].style.display = "none";
      }
      setTimeout(() => {
        document.getElementById("sideButton").style.display = "block";
      }, 200);
    }

    /* Floating side drawer animation */
    var prevScrollpos = window.pageYOffset;
    window.onscroll = function () {
