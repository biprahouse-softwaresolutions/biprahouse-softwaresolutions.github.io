<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <style>
        /* Add a custom class to the fields to adjust their height on mobile */
        @media (max-width: 767px) {

            .custom-field-height,
            .custom-select-height {
                height: calc(100vh / 12) !important;
            }

            .nav-link {
                padding-left: 10px;
                padding-right: 14px;
            }
        }


        @media (min-width: 530px) {
            .container-fluid {
                width: 80vw;
            }
        }

        @media (min-width: 770px) {
            .container-fluid {
                width: 60vw;
            }
        }

        @media (min-width: 1100px) {
            .container-fluid {
                width: 40vw;
            }
        }

        @media (max-width: 500px) {
            .text-center {
                font-size: 8vw !important;
            }
        }

        .form-group {
            margin-bottom: 0px;
        }

        .nav-tabs .nav-link.active {
            background-color: #e5e6ea;
        }

        #output1,
        #output2,
        #output3,
        #output4 {
            font-weight: bold;
        }

        p {
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <h1 class="text-center">Loan Calculator</h1>
        <ul class="nav nav-tabs" id="nav-tab" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" id="nav-emi-tab" data-toggle="tab" href="#nav-emi" role="tab"
                    aria-controls="nav-emi" aria-selected="true">EMI</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="nav-amount-tab" data-toggle="tab" href="#nav-amount" role="tab"
                    aria-controls="nav-amount" aria-selected="false">Amount</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="nav-duration-tab" data-toggle="tab" href="#nav-duration" role="tab"
                    aria-controls="nav-duration" aria-selected="false">Tenure</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="nav-comparison-tab" data-toggle="tab" href="#nav-comparison" role="tab"
                    aria-controls="nav-comparison" aria-selected="false">Rate Comparison</a>
            </li>
        </ul>


        <div class="tab-content" id="nav-tabContent">
            <div class="tab-pane fade show active" id="nav-emi" role="tabpanel" aria-labelledby="nav-emi-tab">
                <form>
                    <div class="form-group">
                        <label for="loanAmount" class="custom-label">Loan amount:</label>
                        <input type="number" class="form-control custom-field-height" id="loanAmount1" min="0" step="1"
                            placeholder="Enter the loan amount" required>
                    </div>

                    <div class="form-group">
                        <label for="rate" class="custom-label">Annual interest rate:</label>
                        <input type="number" class="form-control custom-field-height" id="rate1" min="0" max="100"
                            step="0.01" placeholder="Enter the rate of interest" required>
                    </div>

                    <div class="form-group">
                        <label for="rateType" class="custom-label">Rate type:</label>
                        <select class="custom-select custom-select-height" id="rateType">
                            <option selected value="reducing">Reducing</option>
                            <option value="flat">Flat</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 10px;">
                        <label for="period" class="custom-label">Loan tenure (in months):</label>
                        <input type="number" class="form-control custom-field-height" id="period1" min="0" step="1"
                            placeholder="Enter the loan period" required>
                    </div>



                    <button type="button" class="btn btn-primary" onclick="calculateEMI()">Calculate</button>
                </form>
                <p id="output1"></p>
            </div>


            <div class="tab-pane fade" id="nav-amount" role="tabpanel" aria-labelledby="nav-amount-tab">
                <form>

                    <div class="form-group">
                        <label for="rate" class="custom-label">Annual rate of interest:</label>
                        <input type="number" class="form-control custom-field-height" id="rate2" min="0" max="100"
                            step="0.01" placeholder="Enter the annual rate of interest" required>
                    </div>

                    <div class="form-group">
                        <label for="rateType" class="custom-label">Rate type:</label>
                        <select class="custom-select custom-select-height" id="rateType2">
                            <option selected value="reducing">Reducing</option>
                            <option value="flat">Flat</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="period" class="custom-label">Loan period (in months):</label>
                        <input type="number" class="form-control custom-field-height" id="period2" min="0" step="1"
                            placeholder="Enter the loan period in months" required>
                    </div>



                    <div class="form-group" style="margin-bottom: 10px;">
                        <label for="monthlyEMI2" class="custom-label">EMI amount:</label>
                        <input type="number" class="form-control custom-field-height" id="monthlyEMI2" min="0" step="1"
                            placeholder="Enter your EMI amount" required>
                    </div>



                    <button type="button" class="btn btn-primary" onclick="calculateAmount()">Calculate</button>
                </form>
                <p id="output2"></p>
            </div>

            <div class="tab-pane fade" id="nav-duration" role="tabpanel" aria-labelledby="nav-duration-tab">
                <form>

                    <div class="form-group">
                        <label for="loanAmount" class="custom-label">Loan amount:</label>
                        <input type="number" class="form-control custom-field-height" id="loanAmount3" min="0" step="1"
                            placeholder="Enter the loan amount" required>
                    </div>

                    <div class="form-group">
                        <label for="monthlyEMI1" class="custom-label">EMI amount:</label>
                        <input type="number" class="form-control custom-field-height" id="monthlyEMI3" min="0" step="1"
                            placeholder="Enter your EMI amount" required>
                    </div>

                    <div class="form-group">
                        <label for="rate" class="custom-label">Annual interest rate:</label>
                        <input type="number" class="form-control custom-field-height" id="rate3" min="0" max="100"
                            step="0.01" placeholder="Enter the rate of interest" required>
                    </div>

                    <div class="form-group" style="margin-bottom: 10px;">
                        <label for="rateType" class="custom-label">Rate type:</label>
                        <select class="custom-select custom-select-height" id="rateType3">
                            <option selected value="reducing">Reducing</option>
                            <option value="flat">Flat</option>
                        </select>
                    </div>


                    <button type="button" class="btn btn-primary" onclick="calculateInvPeriod()">Calculate</button>
                </form>
                <p id="output3"></p>
            </div>

            <div class="tab-pane fade" id="nav-comparison" role="tabpanel" aria-labelledby="nav-comparison-tab">
                <form>
                    <div class="form-group">
                        <label for="loanAmount" class="custom-label">Loan amount:</label>
                        <input type="number" class="form-control custom-field-height" id="loanAmount4" min="0" step="1"
                            placeholder="Enter the loan amount" required>
                    </div>

                    <div class="form-group">
                        <label for="rate" class="custom-label">Annual rate of interest:</label>
                        <input type="number" class="form-control custom-field-height" id="rate4" min="0" max="100"
                            step="0.01" placeholder="Enter the annual rate of interest" required>
                    </div>

                    <div class="form-group">
                        <label for="rateType" class="custom-label">Rate type:</label>
                        <select class="custom-select custom-select-height" id="rateType4">
                            <option selected value="reducing">Reducing</option>
                            <option value="flat">Flat</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="period" class="custom-label">Loan period (in months):</label>
                        <input type="number" class="form-control custom-field-height" id="period4" min="0" step="1"
                            placeholder="Enter the loan period in months" required>
                    </div>

                    <button type="button" class="btn btn-primary" onclick="calculateEqvRate()">Calculate</button>
                </form>
                <p id="output4"></p>
            </div>
        </div>
    </div>
    <script>

        function calculateEMI() {
            // event.preventDefault();
            let loanAmount = parseFloat(document.getElementById("loanAmount1").value);
            let rate = document.getElementById("rate1").value / 1200;
            let period = document.getElementById("period1").value;
            let rateType = document.getElementById("rateType").value;
            let emiValue = 0;
            let totalInterest = 0;
            let output = document.getElementById("output1");
            let boxAmount = document.getElementById("loanAmount1");
            let boxRate = document.getElementById("rate1");
            let boxPeriod = document.getElementById("period1");
            let errorInFields = false;

            if (!loanAmount || isNaN(loanAmount) || loanAmount <= 0) {
                boxAmount.style.borderColor = "red";
                errorInFields = true;
            }
            if (!rate || isNaN(rate) || rate <= 0) {
                boxRate.style.borderColor = "red";
                errorInFields = true;
            }
            if (!period || isNaN(period) || period <= 0) {
                boxPeriod.style.borderColor = "red";
                errorInFields = true;
            }

            if (errorInFields) {
                output.style.color = "red";
                output.innerHTML = "Please enter valid input in all fields";
            } else {
                output.style.color = "black";
                boxAmount.style.borderColor = "#ced4da";
                boxRate.style.borderColor = "#ced4da";
                boxPeriod.style.borderColor = "#ced4da";
                if (rateType == "reducing") {
                    emiValue = (loanAmount * rate * (1 + rate) ** period) / ((1 + rate) ** period - 1);
                    // emiValue = (loanAmount * rate) / (1 - (1 + rate) ** (-period));
                    totalInterest = emiValue * period - loanAmount;
                } else {
                    totalInterest = loanAmount * rate * period;
                    emiValue = (loanAmount + totalInterest) / period;

                }


                document.getElementById("output1").innerHTML = "Your EMI is : " + emiValue.toFixed(2) +
                    "<br> Total interest paid : " + totalInterest.toFixed(2) +
                    "<br> Total amount paid : " + (totalInterest + loanAmount).toFixed(2);
            }
        }
        function calculateAmount() {
            // event.preventDefault();
            let monthlyEMI = document.getElementById("monthlyEMI2").value;
            let rate = document.getElementById("rate2").value / 1200;
            let period = document.getElementById("period2").value;
            let rateType = document.getElementById("rateType2").value;
            let loanAmount = 0;
            let totalInterest = 0;
            let output = document.getElementById("output2");
            let boxEMI = document.getElementById("monthlyEMI2");
            let boxRate = document.getElementById("rate2");
            let boxPeriod = document.getElementById("period2");
            let errorInFields = false;


            if (!monthlyEMI || isNaN(monthlyEMI) || monthlyEMI <= 0) {
                boxEMI.style.borderColor = "red";
                errorInFields = true;
            }
            if (!rate || isNaN(rate) || rate <= 0) {
                boxRate.style.borderColor = "red";
                errorInFields = true;
            }
            if (!period || isNaN(period) || period <= 0) {
                boxPeriod.style.borderColor = "red";
                errorInFields = true;
            }

            if (errorInFields) {
                output.style.color = "red";
                output.innerHTML = "Please enter valid input in all fields";
            } else {
                output.style.color = "black";
                boxEMI.style.borderColor = "#ced4da";
                boxRate.style.borderColor = "#ced4da";
                boxPeriod.style.borderColor = "#ced4da";

                if (rateType == "reducing") {
                    loanAmount = monthlyEMI / (rate * (Math.pow(1 + rate, period)) / (Math.pow(1 + rate, period) - 1));
                    console.log("inside Reducing");
                } else {

                    loanAmount = (monthlyEMI * period) / (rate * period + 1);
                }

                totalInterest = monthlyEMI * period - loanAmount;
                document.getElementById("output2").innerHTML = "You can take loan upto : " + loanAmount.toFixed(2) +
                    "<br> Total interest paid : " + totalInterest.toFixed(2) +
                    "<br> Total amount paid : " + (totalInterest + loanAmount).toFixed(2);
            }
        }


        function calculateInvPeriod() {
            // event.preventDefault();
            let loanAmount = parseFloat(document.getElementById("loanAmount3").value);
            let rate = document.getElementById("rate3").value / 1200;
            let emiValue = document.getElementById("monthlyEMI3").value;
            let rateType = document.getElementById("rateType3").value;
            let period = 0;
            let totalInterest = 0;
            let output = document.getElementById("output3");
            let boxEMI = document.getElementById("monthlyEMI3");
            let boxRate = document.getElementById("rate3");
            let boxAmount = document.getElementById("loanAmount3");
            let errorInFields = false;

            if (!emiValue || isNaN(emiValue) || emiValue <= 0) {
                boxEMI.style.borderColor = "red";
                errorInFields = true;
            }
            if (!rate || isNaN(rate) || rate <= 0) {
                boxRate.style.borderColor = "red";
                errorInFields = true;
            }
            if (!loanAmount || isNaN(loanAmount) || loanAmount <= 0) {
                boxAmount.style.borderColor = "red";
                errorInFields = true;
            }

            if (errorInFields) {
                output.style.color = "red";
                output.innerHTML = "Please enter valid input in all fields";
            }

            else {
                output.style.color = "black";
                boxEMI.style.borderColor = "#ced4da";
                boxRate.style.borderColor = "#ced4da";
                boxAmount.style.borderColor = "#ced4da";
                if (rateType == "reducing") {
                    period = (Math.log(emiValue) - Math.log(emiValue - (loanAmount * rate))) / Math.log(1 + rate);

                } else {
                    period = loanAmount / (emiValue - loanAmount * rate);

                }

                totalInterest = emiValue * period - loanAmount;
                output.innerHTML = "Your loan tenure is : " + Math.ceil(period) + " months" +
                    "<br> Total interest paid : " + totalInterest.toFixed(2) +
                    "<br> Total amount paid : " + (totalInterest + loanAmount).toFixed(2);
            }
        }

        function calculateEqvRate() {
            // event.preventDefault();
            let loanAmount = parseFloat(document.getElementById("loanAmount4").value);
            let rate = document.getElementById("rate4").value / 1200;
            let period = document.getElementById("period4").value;
            let rateType = document.getElementById("rateType4").value;
            let output = document.getElementById("output4");
            let boxAmount = document.getElementById("loanAmount4");
            let boxRate = document.getElementById("rate4");
            let boxPeriod = document.getElementById("period4");
            let errorInFields = false;
            let eqvRate = 0;
            let emiValue = 0;
            let totalInterest = 0;
            let total = 0;

            if (!loanAmount || isNaN(loanAmount) || loanAmount <= 0) {
                boxAmount.style.borderColor = "red";
                errorInFields = true;
            }
            if (!rate || isNaN(rate) || rate <= 0) {
                boxRate.style.borderColor = "red";
                errorInFields = true;
            }
            if (!period || isNaN(period) || period <= 0) {
                boxPeriod.style.borderColor = "red";
                errorInFields = true;
            }

            if (errorInFields) {
                output.style.color = "red";
                output.innerHTML = "Please enter valid input in all fields";
            } else {
                output.style.color = "black";
                boxAmount.style.borderColor = "#ced4da";
                boxRate.style.borderColor = "#ced4da";
                boxPeriod.style.borderColor = "#ced4da";
                if (rateType == "reducing") {

                    emiValue = (loanAmount * rate * (1 + rate) ** period) / ((1 + rate) ** period - 1);
                    totalInterest = emiValue * period - loanAmount;
                    eqvRate = (emiValue * period - loanAmount) * 1200 / (period * loanAmount);
                    document.getElementById("output4").innerHTML = "Equivalent flat rate is : " + eqvRate.toFixed(2);
                } else {
                    eqvRate = solveForRate(loanAmount, rate, period);
                    document.getElementById("output4").innerHTML = "Equivalent reducing rate is : " + (eqvRate).toFixed(2);
                }
            }
        }


        function solveForRate(loanAmount, flatRate, loanPeriod) {
            console.log("loanAmount : " + loanAmount);
            console.log("flatRate : " + flatRate);
            console.log("loanPeriod : " + loanPeriod);
            let R = 1.7 * flatRate * 1200;
            let maxIterations = Math.ceil(((1.9 * flatRate * 1200) - (1.7 * flatRate * 1200)) / 0.01);

            for (let i = 0; i < maxIterations; i++) {
                let functionL = (loanAmount * (R / 1200) * (1 + (R / 1200)) ** loanPeriod) / ((1 + (R / 1200)) ** loanPeriod - 1);
                let functionR = (loanAmount * flatRate * loanPeriod + loanAmount) / loanPeriod;
                if (Math.abs(functionL - functionR) <= 0.5) {
                    return R;
                }
                R = R + 0.01;
            }
            return R;
        }
    </script>

    <script>
        $('.custom-field-height').on('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
        $(document).ready(function () {
            $('#nav-tab a').on('click', function (e) {

    </script>
</body>
