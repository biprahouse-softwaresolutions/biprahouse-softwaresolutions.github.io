<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Picker Example</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- Bootstrap Datepicker CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
</head>
<body>
  <div class="container mt-4">
    <h1>Date Picker Example</h1>
    <div class="form-group">
      <label for="date-picker">Select a date:</label>
      <div class="input-group date" id="date-picker-container" data-target-input="nearest">
        <input type="text" class="form-control datetimepicker-input" id="date-picker" data-target="#date-picker-container" placeholder="DD/MM/YYYY" readonly />
        <div class="input-group-append" data-target="#date-picker" data-toggle="datepicker">
          <div class="input-group-text"><i class="fa fa-calendar"></i></div>
        </div>
      </div>
    </div>
    <button type="button" class="btn btn-primary" id="display-date-btn">Display Date</button>
    <div class="mt-4" id="selected-date"></div>
  </div>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <!-- Bootstrap Datepicker JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
  <script>
    $(function() {
      // Initialize datepicker
      $('#date-picker').datepicker({
        format: 'dd/mm/yyyy',
        autoclose: true,
        todayHighlight: true,
      });

      // Handle button click
      $('#display-date-btn').click(function() {
        // Get the selected date
        var selectedDate = $('#date-picker').datepicker('getDate');
        if (selectedDate) {
          // Display the selected date
          var formattedDate = selectedDate.getDate() + ' ' + getMonthName(selectedDate.getMonth()) + ' ' + selectedDate.getFullYear();
          $('#selected-date').html('<p><strong>Selected Date:</strong> ' + formattedDate + '</p><p><strong>Full Date Details:</strong> ' + selectedDate.toDateString() + '</p>');
        } else {
          $('#selected-date').html('<p>Please select a date.</p>');
        }
      });

      // Helper function to get the name of the month
      function getMonthName(monthIndex) {
        var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return monthNames[monthIndex];
      }
    });
  </script>
</body>
</html>
