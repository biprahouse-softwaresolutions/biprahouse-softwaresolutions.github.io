  <script>
    function toggleInflationRate(id) {
      let inflation = document.getElementById(id);
      if (inflation.disabled) {
        inflation.disabled = false;
      } else {
        inflation.disabled = true;
      }
    }
    function calculateFV() {
      event.preventDefault();
      let sipAmount = document.getElementById("sipAmount1").value;
      let rate = document.getElementById("rate1").value / 1200;
      let period = document.getElementById("period1").value;
      let inflationAdjustment = document.getElementById("inflationRate1").checked;
      let inflationRate = document.getElementById("inflation1").value / 1200;

      let output = document.getElementById("output1");
      let boxAmount = document.getElementById("sipAmount1");
      let boxRate = document.getElementById("rate1");
      let boxPeriod = document.getElementById("period1");
      let errorInFields = false;
      output.style.display = "block";

      if (!sipAmount || isNaN(sipAmount) || sipAmount <= 0) {
        boxAmount.style.borderColor = "red";
        errorInFields = true;
      } else boxAmount.style.borderColor = "#ced4da";
      if (!rate || isNaN(rate) || rate <= 0) {
        boxRate.style.borderColor = "red";
        errorInFields = true;
      } else boxRate.style.borderColor = "#ced4da";
      if (!period || isNaN(period) || period <= 0) {
        boxPeriod.style.borderColor = "red";
        errorInFields = true;
      } else boxPeriod.style.borderColor = "#ced4da";

      if (errorInFields) {
        output.style.color = "red";
        output.innerHTML = "Please enter valid input in all fields";
      } else {
        output.style.color = "white";
        if (inflationAdjustment) {
          rate = rate - inflationRate;
        }
        let futureValue = sipAmount * (1 + rate) * (Math.pow(1 + rate, period) - 1) / rate;
        let totalInvestment = sipAmount * period;

        // Create a new span element for totalInvestment
        var totalInvestmentSpan = document.createElement("span");
        totalInvestmentSpan.className = "specialText";
        var totalInvestmentTextNode = document.createTextNode(totalInvestment);
        totalInvestmentSpan.appendChild(totalInvestmentTextNode);

        // Create a new span element for futureValue
        var futureValueSpan = document.createElement("span");
        futureValueSpan.className = "specialText";
        var futureValueTextNode = document.createTextNode(Math.ceil(futureValue));
        futureValueSpan.appendChild(futureValueTextNode);

        // Create a new span element for total return
        var totalReturnSpan = document.createElement("span");
        totalReturnSpan.className = "specialText";
        var totalReturnTextNode = document.createTextNode(Math.ceil((futureValue - (period * sipAmount))));
        totalReturnSpan.appendChild(totalReturnTextNode);

        // Set the inner HTML of the output element to the static text plus the two span elements
        document.getElementById("output1").innerHTML = "Total investment: ";
        document.getElementById("output1").appendChild(totalInvestmentSpan);
        document.getElementById("output1").innerHTML += "<br> Total maturity amount: ";
        document.getElementById("output1").appendChild(futureValueSpan);
        document.getElementById("output1").innerHTML += "<br> Total return : ";
        document.getElementById("output1").appendChild(totalReturnSpan);

      }
    }
    function calculateSIP() {
      event.preventDefault();
      let totalAmount = document.getElementById("totalAmount2").value;
      let rate = document.getElementById("rate2").value / 1200;
      let period = document.getElementById("period2").value;
      let inflationAdjustment = document.getElementById("inflationRate2").checked;
      let inflationRate = document.getElementById("inflation2").value / 1200;

      let output = document.getElementById("output2");
      let boxAmount = document.getElementById("totalAmount2");
      let boxRate = document.getElementById("rate2");
      let boxPeriod = document.getElementById("period2");
      let errorInFields = false;
      output.style.display = "block";
      if (!totalAmount || isNaN(totalAmount) || totalAmount <= 0) {
        boxAmount.style.borderColor = "red";
        errorInFields = true;
      } else boxAmount.style.borderColor = "#ced4da";
      if (!rate || isNaN(rate) || rate <= 0) {
        boxRate.style.borderColor = "red";
        errorInFields = true;
      } else boxRate.style.borderColor = "#ced4da";
      if (!period || isNaN(period) || period <= 0) {
        boxPeriod.style.borderColor = "red";
        errorInFields = true;
      } else boxPeriod.style.borderColor = "#ced4da";

      if (errorInFields) {
        output.style.color = "red";
        output.innerHTML = "Please enter valid input in all fields";
      } else {
        output.style.color = "white";
        if (inflationAdjustment) {
          rate = rate - inflationRate;
        }
        let sipAmount = totalAmount * rate / ((1 + rate) * (Math.pow(1 + rate, period) - 1));

        // Create a new span element with a class of "specialText"
        var spanElement = document.createElement("span");
        spanElement.className = "specialText";

        // Create a new text node containing the toFixed() result
        var textNode = document.createTextNode(sipAmount.toFixed(2));

        // Append the text node to the span element
        spanElement.appendChild(textNode);

        // Set the inner HTML of the output element to the static text plus the span element
        document.getElementById("output2").innerHTML = "SIP amount required: ";
        document.getElementById("output2").appendChild(spanElement);

      }
    }


    function calculateInvPeriod() {
      event.preventDefault();
      let totalAmount = document.getElementById("totalAmount3").value;
      let sipAmount = document.getElementById("sipAmount3").value;
      let rate = document.getElementById("rate3").value / 1200;
      let inflationAdjustment = document.getElementById("inflationRate3").checked;
      let inflationRate = document.getElementById("inflation3").value / 1200;

      let output = document.getElementById("output3");
      let boxAmount = document.getElementById("totalAmount3");
      let boxRate = document.getElementById("rate3");
      let boxAmountSip = document.getElementById("sipAmount3");
      let errorInFields = false;
      output.style.display = "block";
      if (!sipAmount || isNaN(sipAmount) || sipAmount <= 0) {
        boxAmountSip.style.borderColor = "red";
        errorInFields = true;
      } else boxAmountSip.style.borderColor = "#ced4da";
      if (!rate || isNaN(rate) || rate <= 0) {
        boxRate.style.borderColor = "red";
        errorInFields = true;
      } else boxRate.style.borderColor = "#ced4da";
      if (!totalAmount || isNaN(totalAmount) || totalAmount <= 0) {
        boxAmount.style.borderColor = "red";
        errorInFields = true;
      } else boxAmount.style.borderColor = "#ced4da";

      if (errorInFields) {
        output.style.color = "red";
        output.innerHTML = "Please enter valid input in all fields";
      } else {
        output.style.color = "white";
        if (inflationAdjustment) {
          rate = rate - inflationRate;
        }
        let period = Math.log10(((totalAmount * rate) / (sipAmount * (1 + rate))) + 1) / Math.log10(1 + rate);

        // Create a new span element with a class of "specialText"
        var spanElement3 = document.createElement("span");
        spanElement3.className = "specialText";

        // Create a new text node containing the toFixed() result
        var textNode3 = document.createTextNode(period.toFixed(2));

        // Append the text node to the span element
        spanElement3.appendChild(textNode3);

        // Set the inner HTML of the output element to the static text plus the span element
        document.getElementById("output3").innerHTML = "Investment period(in months): ";
        document.getElementById("output3").appendChild(spanElement3);
      }
    }

  <script>
    function isNumberKey(evt) {
      var charCode = (evt.which) ? evt.which : evt.keyCode;
      if (charCode == 45 || charCode == 46) {
        return false;
      }
      if (charCode > 31 && (charCode < 48 || charCode > 57)) {
        return false;
      }
      if (evt.key === "-" || evt.key === "+") {
        return false;
      }
      return true;
    }

    function checkInput(input) {
      input.value = input.value.replace(/[^\d]/g, '');
    }
  </script>
