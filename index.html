<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <style>
    /* Add a custom class to the fields to adjust their height on mobile */
    @media (max-width: 767px) {
      .custom-field-height {
        height: calc(100vh / 12);
      }
      .nav-link{
        padding-left: 6px;
        padding-right: 6px;
      }
    }
  </style>
</head>

<body>
  <div class="container-fluid">
    <h1 class="text-center">SIP Calculator</h1>
    <ul class="nav nav-tabs" id="nav-tab" role="tablist">
      <li class="nav-item">
        <a class="nav-link active" id="nav-future-tab" data-toggle="tab" href="#nav-future" role="tab"
          aria-controls="nav-future" aria-selected="true">Future Value</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" id="nav-amount-tab" data-toggle="tab" href="#nav-amount" role="tab"
          aria-controls="nav-amount" aria-selected="false">SIP Amount</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" id="nav-rate-tab" data-toggle="tab" href="#nav-rate" role="tab" aria-controls="nav-rate"
          aria-selected="false">SIP Duration</a>
      </li>
    </ul>
    <div class="tab-content" id="nav-tabContent">
      <div class="tab-pane fade show active" id="nav-future" role="tabpanel" aria-labelledby="nav-future-tab">
        <form>
          <div class="form-group">
            <label for="sipAmount">Monthly SIP amount:</label>
            <input type="number" class="form-control custom-field-height" id="sipAmount1" min="0" step="0.01"
              placeholder="Enter the monthly SIP amount" required>
          </div>
          <div class="form-group">
            <label for="rate">Expected annual rate of return:</label>
            <input type="number" class="form-control custom-field-height" id="rate1" min="0" max="100" step="0.01"
              placeholder="Enter the expected annual rate of return" required>
          </div>
          <div class="form-group">
            <label for="period">Investment period (in months):</label>
            <input type="number" class="form-control custom-field-height" id="period1" min="0" step="1"
              placeholder="Enter the investment period in months" required>
          </div>
          <div class="form-group">
            <label for="inflationRate">Inflation rate adjustment:</label>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="inflationRate" onchange="toggleInflationRate()"
                required>
              <label class="form-check-label" for="inflationRate"></label>
            </div>
            <input type="number" class="form-control custom-field-height" id="inflation1" min="0" max="100" step="0.01"
              placeholder="Enter the inflation rate" disabled value="7">
          </div>
          <button type="button" class="btn btn-primary" onclick="calculateFV()">Calculate</button>
        </form>
        <p id="output1"></p>
      </div>
      <div class="tab-pane fade" id="nav-amount" role="tabpanel" aria-labelledby="nav-amount-tab">
        <form>
          <div class="form-group">
            <label for="totalAmount">Total target amount:</label>
            <input type="number" class="form-control custom-field-height" id="totalAmount2" min="0" step="0.01"
              placeholder="Enter the total target amount" required>
          </div>
          <div class="form-group">
            <label for="rate">Expected annual rate of return:</label>
            <input type="number" class="form-control custom-field-height" id="rate2" min="0" max="100" step="0.01"
              placeholder="Enter the expected annual rate of return" required>
          </div>
          <div class="form-group">
            <label for="period">Investment period (in months):</label>
            <input type="number" class="form-control custom-field-height" id="period2" min="0" step="1"
              placeholder="Enter the investment period in months" required>
          </div>
          <div class="form-group">
            <label for="inflationRate">Inflation rate adjustment:</label>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="inflationRate" onchange="toggleInflationRate()"
                required>
              <label class="form-check-label" for="inflationRate"></label>
            </div>
            <input type="number" class="form-control custom-field-height" id="inflation2" min="0" max="100" step="0.01"
              placeholder="Enter the inflation rate" disabled value="7">
          </div>
          <button type="button" class="btn btn-primary" onclick="calculateSIP()">Calculate</button>
        </form>
        <p id="output2"></p>
      </div>
      <div class="tab-pane fade" id="nav-rate" role="tabpanel" aria-labelledby="nav-rate-tab">
        <form>
          <div class="form-group">
            <label for="totalAmount">Total target amount:</label>
            <input type="number" class="form-control custom-field-height" id="totalAmount3" min="0" step="0.01"
              placeholder="Enter the total target amount" required>
          </div>
          <div class="form-group">
            <label for="sipAmount">SIP amount:</label>
            <input type="number" class="form-control custom-field-height" id="sipAmount3" min="0" step="0.01"
              placeholder="Enter the SIP amount" required>
          </div>
          <div class="form-group">
            <label for="rate">Expected annual rate of return:</label>
            <input type="number" class="form-control custom-field-height" id="rate3" min="0" max="100" step="0.01"
              placeholder="Enter the expected annual rate of return" required>
          </div>
          <div class="form-group">
            <label for="inflationRate">Inflation rate adjustment:</label>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="inflationRate" onchange="toggleInflationRate()"
                required>
              <label class="form-check-label" for="inflationRate"></label>
            </div>
            <input type="number" class="form-control custom-field-height" id="inflation3" min="0" max="100" step="0.01"
              placeholder="Enter the inflation rate" disabled value="7">
          </div>
          <button type="button" class="btn btn-primary" onclick="calculateInvPeriod()">Calculate</button>
        </form>
        <p id="output3"></p>
      </div>
    </div>
  </div>
  <script>
    function toggleInflationRate() {
      let inflation = document.getElementById("inflation");
      if (inflation.disabled) {
        inflation.disabled = false;
      } else {
        inflation.disabled = true;
      }
    }
    function calculateFV() {
      // event.preventDefault();
      let sipAmount = document.getElementById("sipAmount1").value;
      let rate = document.getElementById("rate1").value / 1200;
      let period = document.getElementById("period1").value;
      let inflationAdjustment = document.getElementById("inflationRate").checked;
      let inflationRate = document.getElementById("inflation1").value / 1200;
      if (!sipAmount || !rate || !period) {
        document.getElementById("output1").innerHTML = "Please enter valid input in all fields";
      } else {
        if (inflationAdjustment) {
          rate = rate - inflationRate;
        }
        let futureValue = sipAmount *(1+rate)*(Math.pow(1 + rate, period)-1)/rate;
        document.getElementById("output1").innerHTML = "Future value of your SIP investment: " + futureValue.toFixed(2)+
         "<br> Total return : " + (futureValue-(period*sipAmount)).toFixed(2);
      }
    }
    function calculateSIP() {
      // event.preventDefault();
      let totalAmount = document.getElementById("totalAmount2").value;
      let rate = document.getElementById("rate2").value / 1200;
      let period = document.getElementById("period2").value;
      let inflationAdjustment = document.getElementById("inflationRate").checked;
      let inflationRate = document.getElementById("inflation2").value / 1200;
      if (!totalAmount || !rate || !period) {
        document.getElementById("output2").innerHTML = "Please enter valid input in all fields";
      } else {
        if (inflationAdjustment) {
          rate = rate - inflationRate;
        }
        let sipAmount = totalAmount * rate / ((1+rate)*(Math.pow(1 + rate, period)-1));
        document.getElementById("output2").innerHTML = "SIP amount required: " + sipAmount.toFixed(2);
      }
    }
  

    function calculateInvPeriod() {
      // event.preventDefault();
      let totalAmount = document.getElementById("totalAmount3").value;
      let sipAmount = document.getElementById("sipAmount3").value;
      let rate = document.getElementById("rate3").value / 1200;
      let inflationAdjustment = document.getElementById("inflationRate").checked;
      let inflationRate = document.getElementById("inflation3").value / 1200;

      if (!totalAmount || !sipAmount || !rate) {
        document.getElementById("output3").innerHTML = "Please enter valid input in all fields";
      } else {
        if (inflationAdjustment) {
          rate = rate - inflationRate;
        }
        let period = Math.log10(((totalAmount*rate)/(sipAmount*(1+rate)))+1)/Math.log10(1+rate);
        document.getElementById("output3").innerHTML = "Investment period required(in months): " + period.toFixed(2);
      }
    }


  </script>
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
    integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
    integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
    crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
    integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
    crossorigin="anonymous"></script>
  <script>
    $('.custom-field-height').on('input', function () {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });
    $(document).ready(function () {
      $('#nav-tab a').on('click', function (e) {
        e.preventDefault();
        $(this).tab('show');
      });
    });
  </script>
</body>

</html>
