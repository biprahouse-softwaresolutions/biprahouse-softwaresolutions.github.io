  <script>
    function calculateDueDate() {
      event.preventDefault();
      let lmpInput = document.getElementById("lmp").value;
      let lmp = new Date(lmpInput);
      let cycle = document.getElementById("cycle").value;

      let output = document.getElementById("output");
      let boxDate = document.getElementById("lmp");
      let boxIcon = document.getElementById("iconBox");
      let boxCycle = document.getElementById("cycle");
      let errorInFields = false;

      output.style.display = "block";

      if (!lmp || isNaN(lmp) || lmp <= 0) {
        boxDate.style.borderColor = "red";
        boxIcon.style.borderColor = "red";
        errorInFields = true;
      } else {
        boxDate.style.borderColor = "#ced4da";
        boxIcon.style.borderColor = "#ced4da";
      }
      if (!cycle || isNaN(cycle) || cycle <= 0) {
        boxCycle.style.borderColor = "red";
        errorInFields = true;
      } else boxCycle.style.borderColor = "#ced4da";
      if (errorInFields) {
        output.style.color = "red";
        output.innerHTML = "Please enter valid input in all fields";
      } else {
        output.style.color = "white";
        let dueDate = new Date(lmp.getTime());
        let pregnancyLength = 280 * 24 * 60 * 60 * 1000;
        let cycleLengthInDays = cycle;

        let diffInMilliseconds = (cycleLengthInDays - 28) * 24 * 60 * 60 * 1000;
        dueDate = new Date(dueDate.getTime() + pregnancyLength + diffInMilliseconds);

        let presentAgeWeek = calculateUnbornBabyAgeWeek(lmp, cycle);
        let presentAgeDays = calculateUnbornBabyAgeDays(lmp, cycle);
        if (presentAgeDays == 7) {
          presentAgeWeek = presentAgeWeek + 1;
          presentAgeDays = 0;
        }
        let options = {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        };
        var weekString = presentAgeWeek > 1 ? "weeks" : "week";
        var dayString = presentAgeDays > 1 ? "days" : "day";
        var outputText = "Expected due date: <span id= 'dateText'>" + dueDate.toLocaleDateString("en-US", options) + "</span><br> Your baby is " + presentAgeWeek + " " + weekString + " and " + presentAgeDays + " " + dayString + " old" + "<br><span id='disclaimer'></span>"

        output.innerHTML = outputText;

        // Start animation for disclaimer text
        var disclaimerElement = document.getElementById("disclaimer");
        var disclaimerText = "Disclaimer: Delivery date may vary depending on various factors";
        var i = 0;

        function typeWriter() {
          if (i < disclaimerText.length) {
            disclaimerElement.innerHTML += disclaimerText.charAt(i);
            i++;
            setTimeout(typeWriter, 50);
          }
        }
        setTimeout(typeWriter, 1000);

        startFireworks();
      }

    }

    function calculateUnbornBabyAgeWeek(lmp, cycle) {
      let today = new Date();
      let averageLMP = new Date(lmp.getTime() - (28 - cycle) * 24 * 60 * 60 * 1000);
      let diffInMilliseconds = today - averageLMP;
      let diffInDays = diffInMilliseconds / 1000 / 60 / 60 / 24;
      let unbornBabyAgeInWeeks = Math.floor(diffInDays / 7);
      return unbornBabyAgeInWeeks;

    }

    function calculateUnbornBabyAgeDays(lmp, cycle) {
      let today = new Date();
      let averageLMP = new Date(lmp.getTime() - (28 - cycle) * 24 * 60 * 60 * 1000);
      let diffInMilliseconds = today - averageLMP;
      let diffInDays = diffInMilliseconds / 1000 / 60 / 60 / 24;
      let unbornBabyAgeInDays = Math.ceil(diffInDays % 7);
      return unbornBabyAgeInDays;
    }
  </script>

  <!-- crackering animation -->
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function createParticles(x, y) {
      const hue = Math.floor(Math.random() * 160);
      for (let i = 0; i < 370; i++) {
        const isLightHue = Math.random() < 0.5;
        const hueRange = isLightHue ? [0, 60] : [200, 260];
        const particleHue = Math.floor(Math.random() * (hueRange[1] - hueRange[0] + 1)) + hueRange[0];
        particles.push({
          x,
          y,
          xv: Math.random() * 8 - 4,
          yv: Math.random() * 5 - 2.5,
          size: Math.random() * 1 + 1,
          sizeDecay: Math.random() * 0.03 + 0.01,
          hue: particleHue,
          brightness: Math.random() * 70 + 30
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        ctx.beginPath();
        ctx.arc(
          particles[i].x,
          particles[i].y,
          particles[i].size,
          0,
          Math.PI * 2
        );
        ctx.fillStyle = `hsla(${particles[i].hue}, 100%, ${particles[i].brightness}%, 0.7)`;
        ctx.fill();
        particles[i].x += particles[i].xv;
        particles[i].y += particles[i].yv;
        particles[i].size -= particles[i].sizeDecay;
        if (particles[i].size < 0.1) particles.splice(i, 1);
      }
      if (particles.length > 0) requestAnimationFrame(animate);
    }

    function startFireworks(e) {
      const x = canvas.width / 2;
      const y = canvas.height / 2;
      const E = createParticles(x, y);
      animate();
    }

  </script>
