<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
        integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <title>BMI Calculator</title>
    <style>
        @media (max-width: 767px) {

            .custom-field-height,
            .custom-select-height {
                height: calc(100vh / 12) !important;
            }

        }


        @media (min-width: 530px) {
            .container {
                width: 80vw;
            }
        }

        @media (min-width: 770px) {
            .container {
                width: 60vw;
            }
        }

        @media (min-width: 1100px) {
            .container {
                width: 40vw;
            }
        }

        @media (max-width: 500px) {
            .text-center {
                font-size: 8vw !important;
                margin-bottom: 1rem !important;
            }
        }

        .form-group {
            margin-bottom: 0px;
        }


        #output {
            font-weight: bold;
        }

        p {
            margin-top: 10px;
            padding-left: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h2 class="text-center">BMI Calculator</h2>
                <form>
                    <div class="form-group">
                        <label for="weight">Weight (in kg):</label>
                        <input type="number" class="form-control custom-field-height" id="weight"
                            placeholder="Enter your weight" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <div class="form-row">
                            <div class="col-8">
                                <label for="height">Height:</label>
                                <input type="number" class="form-control custom-field-height" id="height"
                                    placeholder="Enter your height" required>
                            </div>
                            <div class="col-4">
                                <label for="unitType" class="custom-label">Unit:</label>
                                <select class="custom-select custom-select-height" id="unit" name="unit">
                                    <option selected value="cm">cm</option>
                                    <option value="in">inch</option>
                                </select>
                            </div>

                        </div>
                    </div>

                    <button type="button" class="btn btn-primary" onclick="calculateBMI()">Calculate</button>
                </form>
                

            </div>
            <div class=" col-12">
                <div class="d-flex justify-content-center">
                    <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="300px"
                        height="163px" viewBox="0 0 300 163">
                        <g transform="translate(18,18)" style="font-family:arial,helvetica,sans-serif;font-size: 12px;">
                            <defs>
                                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5"
                                    orient="auto">
                                    <polygon points="0 0, 10 3.5, 0 7"></polygon>
                                </marker>
                                <path id="curvetxt1" d="M-4 140 A140 140, 0, 0, 1, 284 140" style="fill: none;"></path>
                                <path id="curvetxt2" d="M33 43.6 A140 140, 0, 0, 1, 280 140" style="fill: #none;">
                                </path>
                                <path id="curvetxt3" d="M95 3 A140 140, 0, 0, 1, 284 140" style="fill: #none;"></path>
                                <path id="curvetxt4" d="M235.4 33 A140 140, 0, 0, 1, 284 140" style="fill: #none;">
                                </path>
                            </defs>
                            <path d="M0 140 A140 140, 0, 0, 1, 6.9 96.7 L140 140 Z" fill="#bc2020"></path>
                            <path d="M6.9 96.7 A140 140, 0, 0, 1, 12.1 83.1 L140 140 Z" fill="#d38888"></path>
                            <path d="M12.1 83.1 A140 140, 0, 0, 1, 22.6 63.8 L140 140 Z" fill="#ffe400"></path>
                            <path d="M22.6 63.8 A140 140, 0, 0, 1, 96.7 6.9 L140 140 Z" fill="#008137"></path>
                            <path d="M96.7 6.9 A140 140, 0, 0, 1, 169.1 3.1 L140 140 Z" fill="#ffe400"></path>
                            <path d="M169.1 3.1 A140 140, 0, 0, 1, 233.7 36 L140 140 Z" fill="#d38888"></path>
                            <path d="M233.7 36 A140 140, 0, 0, 1, 273.1 96.7 L140 140 Z" fill="#bc2020"></path>
                            <path d="M273.1 96.7 A140 140, 0, 0, 1, 280 140 L140 140 Z" fill="#8a0101"></path>
                            <path d="M45 140 A90 90, 0, 0, 1, 230 140 Z" fill="#fff"></path>
                            <!-- <circle cx="140" cy="140" r="5" fill="#666"></circle> -->
                            <g style="paint-order: stroke;stroke: #fff;stroke-width: 2px;"><text x="25" y="111"
                                    transform="rotate(-72, 25, 111)">16</text><text x="30" y="96"
                                    transform="rotate(-66, 30, 96)">17</text><text x="35" y="83"
                                    transform="rotate(-57, 35, 83)">18.5</text><text x="97" y="29"
                                    transform="rotate(-18, 97, 29)">25</text><text x="157" y="20"
                                    transform="rotate(12, 157, 20)">30</text><text x="214" y="45"
                                    transform="rotate(42, 214, 45)">35</text><text x="252" y="95"
                                    transform="rotate(72, 252, 95)">40</text></g>
                            <g style="font-size: 14px;">
                                <text>
                                    <textPath xlink:href="#curvetxt1">Underweight</textPath>
                                </text><text>
                                    <textPath xlink:href="#curvetxt2">Normal</textPath>
                                </text><text>
                                    <textPath xlink:href="#curvetxt3">Overweight</textPath>
                                </text><text>
                                    <textPath xlink:href="#curvetxt4">Obesity</textPath>
                                </text>
                            </g>
                            <!-- <line x1="140" y1="140" x2="65" y2="140" stroke="#666" stroke-width="2"
                                marker-end="url(#arrowhead)">
                                <animateTransform attributeName="transform" attributeType="XML" type="rotate"
                                    from="0 140 140" to="160 140 140" dur="1s" fill="freeze" repeatCount="1">
                                </animateTransform>
                            </line> -->
                            <text id="textToBeReplaced" x="67" y="120" style="font-size: 25px;font-weight:bold;color:#000;">BMI Meter</text>
                        </g>
                    </svg>
                    
                </div>
            </div>
            <p id="output"></p>
        </div>

    </div>
    <script>
        function calculateBMI() {
            let weight = document.getElementById("weight").value;
            let height = document.getElementById("height").value;
            var unit = document.getElementById("unit").value;
            let output = document.getElementById("output");
            let boxWeight = document.getElementById("weight");
            let boxHeight = document.getElementById("height");
            let errorInFields = false;

            if (!weight || isNaN(weight) || weight <= 0) {
                boxWeight.style.borderColor = "red";
                errorInFields = true;
            } else boxWeight.style.borderColor = "#ced4da";
            if (!height || isNaN(height) || height <= 0) {
                boxHeight.style.borderColor = "red";
                errorInFields = true;
            } else boxHeight.style.borderColor = "#ced4da";
            if (errorInFields) {
                output.style.color = "red";
                output.innerHTML = "Please enter valid input in all fields";
            } else {
                output.style.color = "black";
                if (unit === "in") {
                    height = height * 2.54;
                }
                var bmi = (weight / (height / 100 * height / 100)).toFixed(2);
                let weightToGain = ((18.5 - bmi) * (height / 100 * height / 100)).toFixed(1);
                let weightToLose = ((bmi - 25) * (height / 100 * height / 100)).toFixed(1);
                $('#textToBeReplaced').text("BMI = " + bmi );

                if (bmi < 18.5) {
                    
                    document.getElementById("output").innerHTML =
                        "You are underweight. You should gain minimum " + weightToGain + " kg to become normal.";
                } else if (bmi < 25) {
                    document.getElementById("output").innerHTML =
                        "You have normal weight. ";
                } else if (bmi < 30) {
                    
                    document.getElementById("output").innerHTML =
                        "You are overweight. You need to lose minimum " + weightToLose + " kg to become normal.";
                } else {
                    
                    document.getElementById("output").innerHTML =
                        "You are obese. You need to lose minimum " + weightToLose + " kg to become normal.";
                }

            }

        }

    </script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
        integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
        crossorigin="anonymous"></script>
    <script>
        $('.custom-field-height').on('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>

</html>
