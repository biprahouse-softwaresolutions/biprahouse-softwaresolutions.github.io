  <script>

    function calculateEMI() {
      // event.preventDefault();
      let loanAmount = parseFloat(document.getElementById("loanAmount1").value);
      let rate = document.getElementById("rate1").value / 1200;
      let period = document.getElementById("period1").value;
      let rateType = document.getElementById("rateType").value;
      let emiValue = 0;
      let totalInterest = 0;
      let output = document.getElementById("output1");
      let boxAmount = document.getElementById("loanAmount1");
      let boxRate = document.getElementById("rate1");
      let boxPeriod = document.getElementById("period1");
      let errorInFields = false;

      output.style.display = "block";


      if (!loanAmount || isNaN(loanAmount) || loanAmount <= 0) {
        boxAmount.style.borderColor = "red";
        errorInFields = true;
      }
      if (!rate || isNaN(rate) || rate <= 0) {
        boxRate.style.borderColor = "red";
        errorInFields = true;
      }
      if (!period || isNaN(period) || period <= 0) {
        boxPeriod.style.borderColor = "red";
        errorInFields = true;
      }

      if (errorInFields) {
        output.style.color = "red";
        output.innerHTML = "Please enter valid input in all fields";
      } else {
        output.style.color = "white";
        boxAmount.style.borderColor = "#ced4da";
        boxRate.style.borderColor = "#ced4da";
        boxPeriod.style.borderColor = "#ced4da";
        if (rateType == "reducing") {
          emiValue = (loanAmount * rate * (1 + rate) ** period) / ((1 + rate) ** period - 1);
          // emiValue = (loanAmount * rate) / (1 - (1 + rate) ** (-period));
          totalInterest = emiValue * period - loanAmount;
        } else {
          totalInterest = loanAmount * rate * period;
          emiValue = (loanAmount + totalInterest) / period;

        }



        // Create a new span element for emi
        var emiSpan = document.createElement("span");
        emiSpan.className = "specialText";
        var emiTextNode = document.createTextNode(Math.ceil(emiValue));
        emiSpan.appendChild(emiTextNode);

        // Create a new span element for totalInterestPaid
        var totalInterestPaidSpan = document.createElement("span");
        totalInterestPaidSpan.className = "specialText";
        var totalInterestPaidTextNode = document.createTextNode(Math.ceil(totalInterest));
        totalInterestPaidSpan.appendChild(totalInterestPaidTextNode);

        // Create a new span element for totalAmountPaid
        var totalAmountPaidSpan = document.createElement("span");
        totalAmountPaidSpan.className = "specialText";
        var totalAmountPaidTextNode = document.createTextNode(Math.ceil((totalInterest + loanAmount)));
        totalAmountPaidSpan.appendChild(totalAmountPaidTextNode);

        // Set the inner HTML of the output element to the static text plus the two span elements
        document.getElementById("output1").innerHTML = "Your EMI is : ";
        document.getElementById("output1").appendChild(emiSpan);
        document.getElementById("output1").innerHTML += "<br> Total interest paid : ";
        document.getElementById("output1").appendChild(totalInterestPaidSpan);
        document.getElementById("output1").innerHTML += "<br> Total amount paid : ";
        document.getElementById("output1").appendChild(totalAmountPaidSpan);
      }
    }
    function calculateAmount() {
      // event.preventDefault();
      let monthlyEMI = document.getElementById("monthlyEMI2").value;
      let rate = document.getElementById("rate2").value / 1200;
      let period = document.getElementById("period2").value;
      let rateType = document.getElementById("rateType2").value;
      let loanAmount = 0;
      let totalInterest = 0;
      let output = document.getElementById("output2");
      let boxEMI = document.getElementById("monthlyEMI2");
      let boxRate = document.getElementById("rate2");
      let boxPeriod = document.getElementById("period2");
      let errorInFields = false;
      output.style.display = "block";


      if (!monthlyEMI || isNaN(monthlyEMI) || monthlyEMI <= 0) {
        boxEMI.style.borderColor = "red";
        errorInFields = true;
      }
      if (!rate || isNaN(rate) || rate <= 0) {
        boxRate.style.borderColor = "red";
        errorInFields = true;
      }
      if (!period || isNaN(period) || period <= 0) {
        boxPeriod.style.borderColor = "red";
        errorInFields = true;
      }

      if (errorInFields) {
        output.style.color = "red";
        output.innerHTML = "Please enter valid input in all fields";
      } else {
        output.style.color = "white";
        boxEMI.style.borderColor = "#ced4da";
        boxRate.style.borderColor = "#ced4da";
        boxPeriod.style.borderColor = "#ced4da";

        if (rateType == "reducing") {
          loanAmount = monthlyEMI / (rate * (Math.pow(1 + rate, period)) / (Math.pow(1 + rate, period) - 1));
          console.log("inside Reducing");
        } else {

          loanAmount = (monthlyEMI * period) / (rate * period + 1);
        }

        totalInterest = monthlyEMI * period - loanAmount;


        // Create a new span element for loanAmount
        var loanAmountSpan = document.createElement("span");
        loanAmountSpan.className = "specialText";
        var loanAmountTextNode = document.createTextNode(Math.ceil(loanAmount));
        loanAmountSpan.appendChild(loanAmountTextNode);

        // Create a new span element for totalInterestPaid
        var totalInterestPaidSpan = document.createElement("span");
        totalInterestPaidSpan.className = "specialText";
        var totalInterestPaidTextNode = document.createTextNode(Math.ceil(totalInterest));
        totalInterestPaidSpan.appendChild(totalInterestPaidTextNode);

        // Create a new span element for totalAmountPaid
        var totalAmountPaidSpan = document.createElement("span");
        totalAmountPaidSpan.className = "specialText";
        var totalAmountPaidTextNode = document.createTextNode((Math.ceil(totalInterest + loanAmount)));
        totalAmountPaidSpan.appendChild(totalAmountPaidTextNode);

        // Set the inner HTML of the output element to the static text plus the two span elements
        document.getElementById("output2").innerHTML = "You can take loan upto : ";
        document.getElementById("output2").appendChild(loanAmountSpan);
        document.getElementById("output2").innerHTML += "<br> Total interest paid : ";
        document.getElementById("output2").appendChild(totalInterestPaidSpan);
        document.getElementById("output2").innerHTML += "<br> Total amount paid : ";
        document.getElementById("output2").appendChild(totalAmountPaidSpan);
      }
    }


    function calculateInvPeriod() {
      // event.preventDefault();
      let loanAmount = parseFloat(document.getElementById("loanAmount3").value);
      let rate = document.getElementById("rate3").value / 1200;
      let emiValue = document.getElementById("monthlyEMI3").value;
      let rateType = document.getElementById("rateType3").value;
      let period = 0;
      let totalInterest = 0;
      let output = document.getElementById("output3");
      let boxEMI = document.getElementById("monthlyEMI3");
      let boxRate = document.getElementById("rate3");
      let boxAmount = document.getElementById("loanAmount3");
      let errorInFields = false;
      output.style.display = "block";


      if (!emiValue || isNaN(emiValue) || emiValue <= 0) {
        boxEMI.style.borderColor = "red";
        errorInFields = true;
      }
      if (!rate || isNaN(rate) || rate <= 0) {
        boxRate.style.borderColor = "red";
        errorInFields = true;
      }
      if (!loanAmount || isNaN(loanAmount) || loanAmount <= 0) {
        boxAmount.style.borderColor = "red";
        errorInFields = true;
      }

      if (errorInFields) {
        output.style.color = "red";
        output.innerHTML = "Please enter valid input in all fields";
      }

      else {
        output.style.color = "white";
        boxEMI.style.borderColor = "#ced4da";
        boxRate.style.borderColor = "#ced4da";
        boxAmount.style.borderColor = "#ced4da";
        if (rateType == "reducing") {
          period = (Math.log(emiValue) - Math.log(emiValue - (loanAmount * rate))) / Math.log(1 + rate);

        } else {
          period = loanAmount / (emiValue - loanAmount * rate);

        }

        totalInterest = emiValue * period - loanAmount;
        // Create a new span element for loanTenure
        var loanTenureSpan = document.createElement("span");
        loanTenureSpan.className = "specialText";
        var loanTenureTextNode = document.createTextNode((period).toFixed(1));
        loanTenureSpan.appendChild(loanTenureTextNode);

        // Create a new span element for totalInterestPaid
        var totalInterestPaidSpan = document.createElement("span");
        totalInterestPaidSpan.className = "specialText";
        var totalInterestPaidTextNode = document.createTextNode(Math.ceil(totalInterest));
        totalInterestPaidSpan.appendChild(totalInterestPaidTextNode);

        // Create a new span element for totalAmountPaid
        var totalAmountPaidSpan = document.createElement("span");
        totalAmountPaidSpan.className = "specialText";
        var totalAmountPaidTextNode = document.createTextNode((Math.ceil(totalInterest + loanAmount)));
        totalAmountPaidSpan.appendChild(totalAmountPaidTextNode);

        // Set the inner HTML of the output element to the static text plus the two span elements
        document.getElementById("output3").innerHTML = "Your loan tenure(in months) : ";
        document.getElementById("output3").appendChild(loanTenureSpan);
        document.getElementById("output3").innerHTML += "<br> Total interest paid : ";
        document.getElementById("output3").appendChild(totalInterestPaidSpan);
        document.getElementById("output3").innerHTML += "<br> Total amount paid : ";
        document.getElementById("output3").appendChild(totalAmountPaidSpan);
      }
    }

    function calculateEqvRate() {
      // event.preventDefault();
      let loanAmount = parseFloat(document.getElementById("loanAmount4").value);
      let rate = document.getElementById("rate4").value / 1200;
      let period = document.getElementById("period4").value;
      let rateType = document.getElementById("rateType4").value;
      let output = document.getElementById("output4");
      let boxAmount = document.getElementById("loanAmount4");
      let boxRate = document.getElementById("rate4");
      let boxPeriod = document.getElementById("period4");
      let errorInFields = false;
      let emiValue = 0;
      let totalInterest = 0;
      let total = 0;
      output.style.display = "block";

      if (!loanAmount || isNaN(loanAmount) || loanAmount <= 0) {
        boxAmount.style.borderColor = "red";
        errorInFields = true;
      }
      if (!rate || isNaN(rate) || rate <= 0) {
        boxRate.style.borderColor = "red";
        errorInFields = true;
      }
      if (!period || isNaN(period) || period <= 0) {
        boxPeriod.style.borderColor = "red";
        errorInFields = true;
      }

      if (errorInFields) {
        output.style.color = "red";
        output.innerHTML = "Please enter valid input in all fields";
      } else {
        output.style.color = "white";
        boxAmount.style.borderColor = "#ced4da";
        boxRate.style.borderColor = "#ced4da";
        boxPeriod.style.borderColor = "#ced4da";
        var eqvRate = 0;
        // Create a new span element for eqvRate
        var eqvRateSpan = document.createElement("span");
        eqvRateSpan.className = "specialText";
        if (rateType == "reducing") {

          emiValue = (loanAmount * rate * (1 + rate) ** period) / ((1 + rate) ** period - 1);
          totalInterest = emiValue * period - loanAmount;
          eqvRate = (emiValue * period - loanAmount) * 1200 / (period * loanAmount);
          var eqvRateTextNode = document.createTextNode(eqvRate.toFixed(2));
          eqvRateSpan.appendChild(eqvRateTextNode);

          // Set the inner HTML of the output element to the static text plus the two span elements
          document.getElementById("output4").innerHTML = "Equivalent flat rate is : ";
          document.getElementById("output4").appendChild(eqvRateSpan);
        } else {
          eqvRate = solveForRate(loanAmount, rate, period);
          var eqvRateTextNode = document.createTextNode(eqvRate.toFixed(2));
          eqvRateSpan.appendChild(eqvRateTextNode);

          // Set the inner HTML of the output element to the static text plus the two span elements
          document.getElementById("output4").innerHTML = "Equivalent reducing rate is : ";
          document.getElementById("output4").appendChild(eqvRateSpan);
        }
      }
    }


    function solveForRate(loanAmount, flatRate, loanPeriod) {
      console.log("loanAmount : " + loanAmount);
      console.log("flatRate : " + flatRate);
      console.log("loanPeriod : " + loanPeriod);
      let R = 1.7 * flatRate * 1200;
      let maxIterations = Math.ceil(((1.9 * flatRate * 1200) - (1.7 * flatRate * 1200)) / 0.01);

      for (let i = 0; i < maxIterations; i++) {
        let functionL = (loanAmount * (R / 1200) * (1 + (R / 1200)) ** loanPeriod) / ((1 + (R / 1200)) ** loanPeriod - 1);
        let functionR = (loanAmount * flatRate * loanPeriod + loanAmount) / loanPeriod;
        if (Math.abs(functionL - functionR) <= 0.5) {
          return R;
        }
        R = R + 0.01;
      }
      return R;
    }
  </script>
